<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 175 46" width="175" height="46">
  <defs>
    <filter id="fg"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="172" height="43" x="1.5" y="1.5" rx="7" fill="transparent" stroke="#FFD700" stroke-width="2" filter="url(#fg)">
