<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 185 46" width="185" height="46">
  <defs>
    <filter id="fg"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Fire border - solid, glowing -->
  <rect width="182" height="43" x="1.5" y="1.5" rx="7" fill="transparent" stroke="#0A66C2" stroke-width="2" filter="url(#fg)">
    <animate attributeName="stroke" values="#0A66C2;#FF6B35;#0A66C2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="2;2.5;2" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- LinkedIn "in" box -->
  <rect x="11" y="13" width="20" height="20" rx="4" fill="#0A66C2"/>
  <text x="21" y="27" font-size="13" font-family="Arial,sans-serif" font-weight="bold" fill="#ffffff" text-anchor="middle">in</text>
  <!-- Label -->
  <text x="42" y="28" font-family="'Fira Code',monospace" font-size="13" font-weight="600" fill="#FF6B35">thrinadh2164</text>
</svg>
