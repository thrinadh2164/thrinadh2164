<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 650" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </radialGradient>
    
    <radialGradient id="cyanGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#36BCF7"/>
      <stop offset="70%" stop-color="#0881b8"/>
      <stop offset="100%" stop-color="#010409"/>
    </radialGradient>

    <radialGradient id="purpleGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#bc8cff"/>
      <stop offset="70%" stop-color="#8a2be2"/>
      <stop offset="100%" stop-color="#010409"/>
    </radialGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <style>
      .title { font: 800 36px 'Segoe UI', Arial, sans-serif; fill: #f0f6fc; letter-spacing: 2px; }
      .subtitle { font: 600 14px 'Fira Code', monospace; fill: #8b949e; letter-spacing: 1px; }
      .cta { font: 700 15px 'Segoe UI', Arial; fill: #36BCF7; letter-spacing: 3px; }
    </style>
  </defs>

  <rect width="500" height="650" rx="20" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>

  <!-- Orbital Animation -->
  <g transform="translate(250,260)">
    
    <!-- Rotating Dashed Rings -->
    <g stroke="#36BCF7" stroke-width="1.5" stroke-dasharray="10 15" fill="none" opacity="0.6">
      <circle r="130">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="5 20" fill="none" opacity="0.6">
      <circle r="150">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="25s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Connection Line -->
    <path d="M -80 0 Q 0 -60 80 0" fill="none" stroke="#58a6ff" stroke-width="3" stroke-dasharray="8 8" opacity="0.8">
      <animate attributeName="stroke-dashoffset" from="16" to="0" dur="1s" repeatCount="indefinite" />
    </path>

    <!-- Node 1 (Cyan) -->
    <g transform="translate(-80, 0)">
      <circle r="60" fill="url(#cyanGrad)" filter="url(#glow)">
        <animate attributeName="r" values="55;65;55" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle r="20" fill="#ffffff" opacity="0.9"/>
    </g>

    <!-- Node 2 (Purple) -->
    <g transform="translate(80, 0)">
      <circle r="60" fill="url(#purpleGrad)" filter="url(#glow)">
        <animate attributeName="r" values="65;55;65" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle r="20" fill="#ffffff" opacity="0.9"/>
    </g>
    
  </g>

  <!-- Title Text -->
  <text x="250" y="460" text-anchor="middle" class="title">COLLABORATION</text>
  <text x="250" y="500" text-anchor="middle" class="subtitle">convergence • shared systems • building</text>
  <text x="250" y="560" text-anchor="middle" class="cta">CONNECT →</text>
</svg>
