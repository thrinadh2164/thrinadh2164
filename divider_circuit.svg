<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 45" width="100%" height="45">
  <defs>
    <linearGradient id="cLineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#36BCF7" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#36BCF7"/>
      <stop offset="50%"  stop-color="#FF6B35"/>
      <stop offset="75%"  stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Main line -->
  <line x1="0" y1="22" x2="900" y2="22" stroke="url(#cLineGrad)" stroke-width="1.5" filter="url(#glow2)"/>

  <!-- Left circuit trace -->
  <path d="M 60,22 L 90,22 L 100,12 L 120,12 L 130,22 L 160,22" fill="none" stroke="#36BCF7" stroke-width="1.2" opacity="0.7"/>
  <circle cx="100" cy="12" r="2" fill="#36BCF7" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="22" r="2" fill="#36BCF7" opacity="0.8">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Right circuit trace -->
  <path d="M 740,22 L 770,22 L 780,32 L 800,32 L 810,22 L 840,22" fill="none" stroke="#bc8cff" stroke-width="1.2" opacity="0.7"/>
  <circle cx="780" cy="32" r="2" fill="#bc8cff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="32" r="2" fill="#bc8cff" opacity="0.8">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Center diamond -->
  <path d="M 450,14 L 456,22 L 450,30 L 444,22 Z" fill="none" stroke="#FF6B35" stroke-width="1.5" filter="url(#glow2)">
    <animate attributeName="stroke" values="#FF6B35;#FFD700;#FF2D2D;#FF6B35" dur="3s" repeatCount="indefinite"/>
  </path>
  <circle cx="450" cy="22" r="2" fill="#FF6B35">
    <animate attributeName="fill" values="#FF6B35;#FFD700;#FF2D2D;#FF6B35" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Pulse moving left-to-right along the main line -->
  <path id="cpath" d="M 0,22 L 900,22" fill="none"/>
  <circle r="4" fill="#36BCF7" opacity="0.9" filter="url(#glow2)">
    <animateMotion dur="2.5s" repeatCount="indefinite"><mpath xlink:href="#cpath"/></animateMotion>
    <animate attributeName="fill" values="#36BCF7;#FF6B35;#bc8cff;#36BCF7" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;5;3;4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Second pulse, offset -->
  <circle r="3" fill="#bc8cff" opacity="0.7" filter="url(#glow2)">
    <animateMotion dur="2.5s" begin="1.25s" repeatCount="indefinite"><mpath xlink:href="#cpath"/></animateMotion>
  </circle>
</svg>
