<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 45" width="100%" height="45">
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF2D2D" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#FF6B35"/>
      <stop offset="50%"  stop-color="#FFD700"/>
      <stop offset="80%"  stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF2D2D" stop-opacity="0"/>
    </linearGradient>
    <filter id="fw">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Main line -->
  <line x1="0" y1="22" x2="900" y2="22" stroke="url(#cg)" stroke-width="1.5" filter="url(#fw)"/>

  <!-- Left circuit trace - fire -->
  <path d="M 55,22 L 85,22 L 95,12 L 115,12 L 125,22 L 155,22" fill="none" stroke="#FF6B35" stroke-width="1.2" opacity="0.8"/>
  <circle cx="95"  cy="12" r="2.5" fill="#FFD700">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="115" cy="12" r="2.5" fill="#FF2D2D">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Right circuit trace - fire -->
  <path d="M 745,22 L 775,22 L 785,32 L 805,32 L 815,22 L 845,22" fill="none" stroke="#FF6B35" stroke-width="1.2" opacity="0.8"/>
  <circle cx="785" cy="32" r="2.5" fill="#FFD700">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="805" cy="32" r="2.5" fill="#FF2D2D">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Center fire diamond -->
  <path d="M 450,13 L 458,22 L 450,31 L 442,22 Z" fill="none" stroke="#FFD700" stroke-width="2" filter="url(#fw)">
    <animate attributeName="stroke" values="#FFD700;#FF6B35;#FF2D2D;#FFD700" dur="2s" repeatCount="indefinite"/>
  </path>
  <circle cx="450" cy="22" r="3" fill="#FFD700">
    <animate attributeName="fill" values="#FFD700;#FF6B35;#FF2D2D;#FFD700" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Pulse moving left to right -->
  <circle cx="0" cy="22" r="4.5" fill="#FF6B35" filter="url(#fw)">
    <animate attributeName="cx" from="0" to="900" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#FF6B35;#FFD700;#FF2D2D;#FF6B35" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4.5;5.5;3.5;4.5" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <!-- Second pulse offset -->
  <circle cx="0" cy="22" r="3" fill="#FFD700" filter="url(#fw)">
    <animate attributeName="cx" from="0" to="900" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
</svg>
