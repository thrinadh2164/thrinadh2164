<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title { font: 900 65px 'Segoe UI', Arial, sans-serif; fill: #58a6ff; letter-spacing: 6px; }
      .subtitle { font: 700 18px 'Fira Code', monospace; fill: #8b949e; letter-spacing: 3px; }
      
      @keyframes glitch1 {
        0% { transform: translate(0) }
        20% { transform: translate(-3px, 1px) }
        40% { transform: translate(-1px, -1px) }
        60% { transform: translate(3px, 1px) }
        80% { transform: translate(1px, -1px) }
        100% { transform: translate(0) }
      }
      @keyframes glitch2 {
        0% { transform: translate(0) }
        20% { transform: translate(3px, -1px) }
        40% { transform: translate(1px, 1px) }
        60% { transform: translate(-3px, -1px) }
        80% { transform: translate(-1px, 1px) }
        100% { transform: translate(0) }
      }
      .g1 { animation: glitch1 2s infinite; fill: #0ff; opacity: 0.7; }
      .g2 { animation: glitch2 3s infinite; fill: #f0f; opacity: 0.7; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="220" fill="transparent"/>
  
  <!-- Cyberpunk Frame -->
  <path d="M 40,30 L 140,30 L 160,50 L 840,50 L 860,30 L 960,30 M 40,190 L 140,190 L 160,170 L 840,170 L 860,190 L 960,190" fill="none" stroke="#30363d" stroke-width="2"/>
  
  <!-- Animated Edge Pulses -->
  <path d="M 160,50 L 840,50" stroke="#58a6ff" stroke-width="3" filter="url(#glow)">
    <animate attributeName="opacity" values="0.1;1;0.1" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M 160,170 L 840,170" stroke="#58a6ff" stroke-width="3" filter="url(#glow)">
    <animate attributeName="opacity" values="0.1;1;0.1" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </path>

  <!-- Central Title with Glitch Effect -->
  <g transform="translate(500, 115)">
    <!-- Glitch Layers -->
    <text x="0" y="0" text-anchor="middle" class="title g1">THRINADH CORE SYSTEM</text>
    <text x="0" y="0" text-anchor="middle" class="title g2">THRINADH CORE SYSTEM</text>
    <!-- Main Text -->
    <text x="0" y="0" text-anchor="middle" class="title" filter="url(#glow)">THRINADH CORE SYSTEM</text>
  </g>
  
  <text x="500" y="150" text-anchor="middle" class="subtitle">PRIMARY ACCESS PORTAL - AI &amp; ML - FULL-STACK</text>

  <!-- Side Decorations -->
  <g fill="#58a6ff" filter="url(#glow)">
    <rect x="50" y="105" width="20" height="4">
        <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="50" y="115" width="10" height="4">
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    
    <rect x="930" y="105" width="20" height="4">
        <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="940" y="115" width="10" height="4">
        <animate attributeName="opacity" values="0;1;0" dur="1.7s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
