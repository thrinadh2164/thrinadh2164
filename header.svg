<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Synthwave / Vintage Console Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#090514"/>
      <stop offset="100%" stop-color="#1f0a33"/>
    </linearGradient>
    
    <!-- Neon Text Gradient (Purple, Green, Blue) -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d2a8ff"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#56d364"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      .title { font: 34px 'Press Start 2P', monospace; fill: url(#textGrad); letter-spacing: 1px; }
      .titleShadow { font: 34px 'Press Start 2P', monospace; fill: #d2a8ff; opacity: 0.5; }
      .subtitle { font: 700 16px 'Fira Code', monospace; fill: #56d364; letter-spacing: 4px; }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor { animation: blink 1s step-end infinite; }
      
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      .floating { animation: float 4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="220" fill="url(#bg)"/>
  
  <!-- Retro Grid Floor -->
  <g stroke="#d2a8ff" stroke-width="1.5" opacity="0.3">
    <path d="M 0,160 L 1000,160 M 0,180 L 1000,180 M 0,200 L 1000,200 M 0,220 L 1000,220"/>
    <path d="M 500,150 L 500,220 M 450,150 L 200,220 M 550,150 L 800,220 M 400,150 L -100,220 M 600,150 L 1100,220"/>
  </g>
  
  <!-- Glowing Neon Borders -->
  <rect x="20" y="20" width="960" height="180" rx="10" fill="none" stroke="#58a6ff" stroke-width="4" stroke-dasharray="15 15" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" from="0" to="-60" dur="2s" repeatCount="indefinite" />
  </rect>
  <rect x="30" y="30" width="940" height="160" rx="6" fill="none" stroke="#56d364" stroke-width="2" filter="url(#glow)"/>

  <!-- Vintage Arcade Title -->
  <g class="floating">
    <text x="503" y="103" text-anchor="middle" class="titleShadow" filter="url(#glow)">THRINADH CORE SYSTEM</text>
    <text x="500" y="100" text-anchor="middle" class="title" filter="url(#glow)">THRINADH CORE SYSTEM</text>
  </g>
  
  <!-- Subtitle -->
  <text x="500" y="150" text-anchor="middle" class="subtitle" filter="url(#glow)">> INIT_PORTAL<tspan class="cursor">_</tspan></text>

</svg>
