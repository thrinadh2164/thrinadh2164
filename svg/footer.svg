<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 100" width="100%" height="100">
  <defs>
    <linearGradient id="fireLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF2D2D" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF2D2D" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Bottom glowing line -->
  <rect x="0" y="88" width="900" height="2" fill="url(#fireLine)" filter="url(#glow)"/>
  
  <!-- Subtle tech corner accents -->
  <path d="M 40,70 L 40,88 L 120,88" fill="none" stroke="#FF2D2D" stroke-width="1.5" opacity="0.6"/>
  <path d="M 860,70 L 860,88 L 780,88" fill="none" stroke="#FF2D2D" stroke-width="1.5" opacity="0.6"/>
  
  <line x1="120" y1="84" x2="120" y2="92" stroke="#FF6B35" stroke-width="1.5" opacity="0.8"/>
  <line x1="780" y1="84" x2="780" y2="92" stroke="#FF6B35" stroke-width="1.5" opacity="0.8"/>

  <!-- Text -->
  <text x="450" y="60" text-anchor="middle" font-family="'Fira Code', monospace" font-size="12" font-weight="600" fill="#FF6B35" letter-spacing="4" filter="url(#glow)">[ EOF : CONNECTION_TERMINATED ]</text>

  <!-- Fire Particles rising from the bottom line -->
  <circle cx="200" cy="88" r="2" fill="#FFD700">
    <animate attributeName="cy" values="88;40;88" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="88" r="1.5" fill="#FF2D2D">
    <animate attributeName="cy" values="88;55;88" dur="2.8s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.8s" begin="1s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="700" cy="88" r="2.5" fill="#FFD700">
    <animate attributeName="cy" values="88;30;88" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="88" r="1.5" fill="#FF6B35">
    <animate attributeName="cy" values="88;50;88" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="450" cy="88" r="2" fill="#FF6B35" filter="url(#glow)">
    <animate attributeName="cy" values="88;70;88" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
