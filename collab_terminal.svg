<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <linearGradient id="fireBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF2D2D"/>
      <stop offset="40%"  stop-color="#FF6B35"/>
      <stop offset="70%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF2D2D"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .term-header { font: 700 22px 'Fira Code', monospace; fill: #FF6B35; letter-spacing: 2px; }
      .term-sub { font: 500 15px 'Fira Code', monospace; fill: #FF9F45; letter-spacing: 1px; }
      .term-item { font: 600 17px 'Fira Code', monospace; }
      .glitch { animation: glitch 4s infinite; }
      @keyframes glitch {
        0%,95%{ opacity:1; transform:translate(0,0); }
        96%{ opacity:0.8; transform:translate(-2px,2px); }
        97%{ opacity:0.9; transform:translate(2px,-2px); }
        98%{ opacity:1; transform:translate(0,0); }
      }
    </style>
  </defs>

  <!-- Base dim border -->
  <rect width="996" height="296" x="2" y="2" rx="15" fill="transparent" stroke="#30363d" stroke-width="2"/>
  
  <!-- Fire Star / Comet Trail (Perimeter ~2559) -->
  <rect width="996" height="296" x="2" y="2" rx="15" fill="transparent" stroke="url(#fireBorder)" stroke-width="4" stroke-linecap="round" stroke-dasharray="150 2409" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" from="2559" to="0" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Fire corner accents -->
  <path d="M 2,2 L 2,40 M 2,2 L 40,2" fill="none" stroke="#FF2D2D" stroke-width="3" filter="url(#glow)"/>
  <path d="M 998,2 L 998,40 M 998,2 L 960,2" fill="none" stroke="#FF2D2D" stroke-width="3" filter="url(#glow)"/>
  <path d="M 2,298 L 2,260 M 2,298 L 40,298" fill="none" stroke="#FFD700" stroke-width="3" filter="url(#glow)"/>
  <path d="M 998,298 L 998,260 M 998,298 L 960,298" fill="none" stroke="#FFD700" stroke-width="3" filter="url(#glow)"/>

  <!-- Terminal Content -->
  <g transform="translate(50, 55)">
    <g class="glitch">
      <text x="0" y="0" class="term-header">&gt; INITIATE COLLABORATION_PROTOCOL</text>
      <text x="0" y="38" class="term-sub">Scanning for compatible vectors and shared systems...</text>

      <g transform="translate(20, 82)">
        <text x="0"   y="0"  class="term-item" fill="#FFD700">[+] Generative AI &amp; RAG Pipelines</text>
        <text x="0"   y="38" class="term-item" fill="#FF6B35">[+] Multi-Agent Frameworks</text>
        <text x="390" y="0"  class="term-item" fill="#FFD700">[+] Full-Stack Architecture</text>
        <text x="390" y="38" class="term-item" fill="#FF6B35">[+] Scalable ML Infrastructure</text>
      </g>

      <text x="0" y="185" class="term-sub">&gt; STATUS: <tspan fill="#FFD700" filter="url(#glow)">AWAITING_CONNECTION_</tspan></text>
    </g>
  </g>

  <!-- Fire animated node graphic on the right -->
  <g transform="translate(855, 150)">
    <!-- Rotating outer ring - fire -->
    <circle r="82" fill="none" stroke="#FF6B35" stroke-width="1.5" stroke-dasharray="10 8" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
    </circle>
    <!-- Rotating inner ring - gold -->
    <circle r="58" fill="none" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="5 10" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <!-- Pulsing fire core -->
    <circle r="28" fill="#FF2D2D" filter="url(#glow)" opacity="0.85">
      <animate attributeName="r" values="25;34;25" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#FF2D2D;#FF6B35;#FFD700;#FF2D2D" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="10" fill="#FFD700" filter="url(#glow)">
      <animate attributeName="r" values="8;12;8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Orbital fire sparks -->
    <circle cx="60" cy="0" r="5" fill="#FF6B35" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-45" cy="38" r="4" fill="#FFD700" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="-55" r="3" fill="#FF2D2D" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
