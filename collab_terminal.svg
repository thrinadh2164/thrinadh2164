<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </radialGradient>
    
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#36BCF7"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .term-header { font: 700 24px 'Fira Code', monospace; fill: #58a6ff; letter-spacing: 2px; }
      .term-sub { font: 500 16px 'Fira Code', monospace; fill: #8b949e; letter-spacing: 1px; }
      .term-item { font: 600 18px 'Fira Code', monospace; fill: #f0f6fc; }
      .glitch { animation: glitch 4s infinite; }
      @keyframes glitch {
        0%, 95% { opacity: 1; transform: translate(0,0); }
        96% { opacity: 0.8; transform: translate(-2px,2px); }
        97% { opacity: 0.9; transform: translate(2px,-2px); }
        98% { opacity: 1; transform: translate(0,0); }
      }
    </style>
  </defs>

  <!-- Background / Window -->
  <rect width="996" height="296" x="2" y="2" rx="15" fill="transparent" stroke="url(#borderGrad)" stroke-width="2" stroke-dasharray="20 15">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="5s" repeatCount="indefinite" />
  </rect>

  <!-- Terminal Content -->
  <g transform="translate(50, 60)">
    <g class="glitch">
      <text x="0" y="0" class="term-header">> INITIATE COLLABORATION_PROTOCOL</text>
      <text x="0" y="40" class="term-sub">Scanning for compatible vectors and shared systems...</text>
      
      <g transform="translate(20, 90)">
        <text x="0" y="0" class="term-item" fill="#36BCF7">[+] Generative AI &amp; RAG Pipelines</text>
        <text x="0" y="40" class="term-item" fill="#bc8cff">[+] Multi-Agent Frameworks</text>
        
        <text x="400" y="0" class="term-item" fill="#36BCF7">[+] Full-Stack Architecture</text>
        <text x="400" y="40" class="term-item" fill="#58a6ff">[+] Scalable ML Infrastructure</text>
      </g>
      
      <text x="0" y="190" class="term-sub">> STATUS: <tspan fill="#3fb950">AWAITING_CONNECTION</tspan><tspan fill="#3fb950" class="glitch">_</tspan></text>
    </g>
  </g>

  <!-- Animated Node Graphic on the right -->
  <g transform="translate(850, 150)">
    <!-- Rotating Rings -->
    <g stroke="#36BCF7" stroke-width="1.5" stroke-dasharray="8 8" fill="none" opacity="0.5">
      <circle r="80">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4 12" fill="none" opacity="0.6">
      <circle r="60">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="10s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Pulsing Center -->
    <circle r="30" fill="#58a6ff" filter="url(#glow)" opacity="0.8">
      <animate attributeName="r" values="25;35;25" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="10" fill="#ffffff"/>
    
    <!-- Floating Orbitals -->
    <circle cx="60" cy="0" r="5" fill="#bc8cff" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-40" cy="40" r="4" fill="#36BCF7" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

</svg>
